<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pravin | DevOps Terminal</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="terminal">
  <div class="header">
    <span class="dot red"></span>
    <span class="dot yellow"></span>
    <span class="dot green"></span>
    <span class="title">pravin@devops:~</span>
  </div>

  <div class="output" id="output"></div>

  <div class="input-line">
    <span class="prompt">pravin@devops:~$</span>
    <input type="text" id="commandInput" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
  </div>
</div>

<script src="./js/commands.js"></script>
<script src="script.js"></script>
</body>
</html>
