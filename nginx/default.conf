server {
    listen 80;
    server_name rootssh.me www.rootssh.me;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name rootssh.me www.rootssh.me;

    ssl_certificate /etc/letsencrypt/live/rootssh.me/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/rootssh.me/privkey.pem;

    root /usr/share/nginx/html;
    index index.html;

    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    gzip on;
    gzip_vary on;
    gzip_min_length 256;
    gzip_types text/plain text/css application/javascript application/json application/manifest+json image/svg+xml font/woff2;

    location / {
        try_files $uri $uri/ =404;
    }

    location ~* \.(?:css|js|png|jpg|jpeg|gif|ico|svg|webmanifest|woff2?)$ {
        try_files $uri =404;
        expires 30d;
        add_header Cache-Control "public, immutable";
        add_header X-Content-Type-Options nosniff always;
        access_log off;
    }

    location ^~ /api/ {
        proxy_pass http://node-app:3000/;
    }
}

server {
    listen 443 ssl;
    server_name grafana.rootssh.me;

    ssl_certificate /etc/letsencrypt/live/grafana.rootssh.me/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/grafana.rootssh.me/privkey.pem;

    location / {
        proxy_pass http://grafana:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
