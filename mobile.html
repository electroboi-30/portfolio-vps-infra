<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pravin | DevOps Terminal</title>

<style>
body {
  margin: 0;
  background: black;
  color: #00ff9c;
  font-family: monospace;
  display: flex;
  flex-direction: column;
  height: 100vh;
  overflow: hidden;
}

/* HEADER */
.header {
  padding: 12px;
  border-bottom: 1px solid #00ff9c33;
  text-shadow: 0 0 5px #00ff9c;
}

/* BUTTON GRID */
.buttons {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 10px;
  padding: 12px;
}

/* CYBER BUTTON */
button {
  padding: 12px;
  background: black;
  color: #00ff9c;
  border: 1px solid #00ff9c;
  border-radius: 6px;
  font-family: monospace;
  position: relative;
  overflow: hidden;
  transition: 0.2s;
}

/* glow */
button:hover {
  box-shadow: 0 0 10px #00ff9c;
}

/* click animation */
button:active {
  transform: scale(0.95);
  background: #00ff9c;
  color: black;
}

/* scan line effect */
button::after {
  content: "";
  position: absolute;
  top: 0;
  left: -100%;
  width: 100%;
  height: 100%;
  background: linear-gradient(90deg, transparent, #00ff9c55, transparent);
  transition: 0.4s;
}

button:active::after {
  left: 100%;
}

/* OUTPUT TERMINAL */
.output {
  flex: 1;
  overflow-y: auto;
  padding: 15px;
  border-top: 1px solid #00ff9c33;
  white-space: pre-wrap;
  text-shadow: 0 0 3px #00ff9c;
  animation: flicker 1.5s infinite alternate;
}

/* flicker effect */
@keyframes flicker {
  0% { opacity: 0.9; }
  100% { opacity: 1; }
}

/* typing cursor */
.cursor::after {
  content: "_";
  animation: blink 1s infinite;
}

@keyframes blink {
  50% { opacity: 0; }
}
</style>
</head>

<body>

<div class="header">
  <span class="cursor">pravin@rootssh:~$ mobile</span>
</div>

<div class="buttons">
  <button onclick="run('help')">help</button>
  <button onclick="run('whoami')">whoami</button>
  <button onclick="run('skills')">skills</button>
  <button onclick="run('projects')">projects</button>
  <button onclick="run('experience')">experience</button>
  <button onclick="run('contact')">contact</button>
  <button onclick="run('stats')">stats</button>
  <button onclick="clearOutput()">clear</button>
</div>

<div class="output" id="output">
> Tap a command to begin...
</div>

<script src="commands.js"></script>

<script>
const output = document.getElementById("output");

/* typing effect */
async function typeText(text) {
  output.innerHTML = "";
  for (let char of text) {
    output.innerHTML += char;
    await new Promise(r => setTimeout(r, 10));
  }
}

/* main runner */
async function run(cmd) {

  if (cmd === "stats") {
    await typeText("> Fetching live stats...\n");

    try {
      const res = await fetch("/api/stats");
      const data = await res.json();

      await typeText(`
CPU Usage: ${data.cpu}
RAM Usage: ${data.ram}
Uptime: ${data.uptime}
`);
    } catch {
      await typeText("Error fetching stats");
    }
    return;
  }

  if (commands[cmd]) {
    await typeText(commands[cmd]);
  }
}

function clearOutput() {
  typeText("Type 'help' to begin.");
}
</script>

</body>
</html>
