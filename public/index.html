<body>
  <noscript>
    <h1>Pravin Nayakar — DevOps Engineer</h1>
    <p>DevOps Engineer specializing in Linux, NGINX, Docker, CI/CD, and self-hosted infrastructure. Based in Chennai, India. This site requires JavaScript for the interactive terminal experience.</p>
  </noscript>

  <div class="scanlines"></div>
  <div class="noise"></div>

  <div class="terminal-wrapper">

    <!-- TOP BAR -->
    <div class="topbar">
      <div class="topbar-left">
        <span class="dot red"></span>
        <span class="dot yellow"></span>
        <span class="dot green"></span>
        <span class="sys-label">SYSTEM ONLINE</span>
      </div>
      <div class="topbar-center">
        <span class="title-text" id="titleText" data-text="pravin@devops:~">pravin@devops:~</span>
      </div>
      <div class="topbar-right">
        <span class="clock" id="clock">--:--:--</span>
      </div>
    </div>

    <div class="main-layout">

      <!-- LEFT SIDEBAR: COMMAND BUTTONS -->
      <div class="sidebar">
        <div class="sidebar-label">// COMMANDS</div>
        <div class="cmd-grid">
          <button class="cmd-btn" onclick="run('help')">
            <span class="btn-prefix">01</span>
            <span class="btn-label">help</span>
          </button>
          <button class="cmd-btn" onclick="run('whoami')">
            <span class="btn-prefix">02</span>
            <span class="btn-label">whoami</span>
          </button>
          <button class="cmd-btn" onclick="run('skills')">
            <span class="btn-prefix">03</span>
            <span class="btn-label">skills</span>
          </button>
          <button class="cmd-btn" onclick="run('projects')">
            <span class="btn-prefix">04</span>
            <span class="btn-label">projects</span>
          </button>
          <button class="cmd-btn" onclick="run('experience')">
            <span class="btn-prefix">05</span>
            <span class="btn-label">experience</span>
          </button>
          <button class="cmd-btn" onclick="run('contact')">
            <span class="btn-prefix">06</span>
            <span class="btn-label">contact</span>
          </button>
          <button class="cmd-btn accent" onclick="run('stats')">
            <span class="btn-prefix">07</span>
            <span class="btn-label">stats</span>
          </button>
          <button class="cmd-btn danger" onclick="clearOutput()">
            <span class="btn-prefix">--</span>
            <span class="btn-label">clear</span>
          </button>
        </div>

        <div class="sidebar-status">
          <div class="status-row">
            <span class="status-dot blink"></span>
            <span>SSH ACTIVE</span>
          </div>
          <div class="status-row">
            <span class="status-dot"></span>
            <span>NGINX RUNNING</span>
          </div>
          <div class="status-row">
            <span class="status-dot"></span>
            <span>NODE ONLINE</span>
          </div>
        </div>
      </div>

      <!-- RIGHT: OUTPUT PANEL -->
      <div class="output-panel">
        <div class="output-header">
          <span>OUTPUT</span>
          <span class="output-badge" id="lineCount">0 lines</span>
          <span class="loading-bar" id="loadingBar"></span>
        </div>
        <div class="output" id="output"></div>
        <div class="output-footer">
          <span class="cursor-line">pravin@devops:~$ <span class="cursor">█</span></span>
          <span class="hint">tap any command →</span>
        </div>
      </div>

    </div>
  </div>
